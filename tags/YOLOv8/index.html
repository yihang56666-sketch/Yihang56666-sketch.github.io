<script>
  let hitokotoText = document.getElementById('hitokoto_text')
  let hitokotoErroText = document.getElementById('hitokoto_error_text')
  let hitokotoCategory = document.getElementById('hitokoto_text_parent').getAttribute('hitokotoCategory')
  window.addEventListener('load', function () {
    let url = 'https://v1.hitokoto.cn'
    if (hitokotoCategory) {
      url += '?c=' + hitokotoCategory
    }
    fetch(url)
      .then(response => response.json())
      .then(data => {
        hitokotoText.innerText = "「 " + data.hitokoto + " 」 from " + data.from
        hitokotoText.href = 'https://hitokoto.cn/?uuid=' + data.uuid
      })
      .catch((reason) => {
        console.error(11, reason)
        hitokotoText.style.display = 'none'
        hitokotoErroText.style.display = 'block'
      })
  })

<script>
    // ----- Variable declaration

    var data = {
        dt: new Date(),
        hours: {
            el: document.querySelector('#hours'),
            val: 0
        },

        minutes: {
            el: document.querySelector('#minutes'),
            val: 0
        },

        seconds: {
            el: document.querySelector('#seconds'),
            val: 0
        },

        renderTime: 1000
    };


    // ----- Clock rendering logic

    updateTime = () => {
        let hour = data.dt.getHours();
        let minute = data.dt.getMinutes();
        let second = data.dt.getSeconds();

        data.hours.el.classList.add('moving');
        data.minutes.el.classList.add('moving');
        data.seconds.el.classList.add('moving');

        data.hours.val = hour == 0 && data.hours.val == 59 * 6 * 5 ? 360 : hour * 6 * 5;
        data.minutes.val = minute == 0 && data.minutes.val == 59 * 6 ? 360 : minute * 6;
        data.seconds.val = second == 0 && data.seconds.val == 59 * 6 ? 360 : second * 6;

        data.hours.el.style.transform = `translate(-50%, -75%) rotate(${data.hours.val}deg)`;
        data.minutes.el.style.transform = `translate(-50%, -75%) rotate(${data.minutes.val}deg)`;
        data.seconds.el.style.transform = `translate(-50%, -75%) rotate(${data.seconds.val}deg)`;

        data.dt.setSeconds(second + 1);
    };

    // ----- Clock execution

    setInterval(() => {
        updateTime();
    }, data.renderTime);

    updateTime();

    // ----- Events area

    data.seconds.el.addEventListener('transitionend', () => {
        data.hours.el.classList.remove('moving');
        data.minutes.el.classList.remove('moving');
        data.seconds.el.classList.remove('moving');

        // if (data.hours.val == 360) {
        //   data.hours.el.style.transform = 'translate(-50%, -75%) rotate(0deg)';
        // }

        if (data.minutes.val == 360) {
            data.minutes.el.style.transform = 'translate(-50%, -75%) rotate(0deg)';
        }

        if (data.seconds.val == 360) {
            data.seconds.el.style.transform = 'translate(-50%, -75%) rotate(0deg)';
        }
    });

</script>

      // Disable background scrolling when opening chatbot
      document.body.style.overflow = 'hidden';
      document.body.style.touchAction = 'none';
    } else {
      // Enable background scrolling when closing chatbot
      document.body.style.overflow = '';
      document.body.style.touchAction = '';
    }
    
    // Load iframe only when opening the chatbot for the first time
    if (isOpening && !iframeLoaded) {
      // Wait for the window to be fully visible before loading iframe
      setTimeout(() => {
        const iframe = document.createElement('iframe');
        iframe.src = '';
        iframe.style.cssText = '';
        iframe.frameBorder = '0';
        iframe.allow = 'microphone';
        
        // Set timeout to hide loading animation after 5 seconds
        const loadingTimeout = setTimeout(() => {
          if (chatbotLoading) {
            chatbotLoading.style.display = 'none';
          }
        }, 5000);
        
        // Hide loading animation when iframe is loaded (if before 5 seconds)
        iframe.onload = () => {
          clearTimeout(loadingTimeout);
          if (chatbotLoading) {
            chatbotLoading.style.display = 'none';
          }
        };
        
        chatbotContent.appendChild(iframe);
        iframeLoaded = true;
      }, 300); // Wait for CSS transition to complete
    }

    // Reset processing flag after a short delay
    setTimeout(() => {
      isProcessing = false;
    }, 300);
  }

  // Add event listeners for both click and touch events
  if (chatbotButton) {
    chatbotButton.addEventListener('click', toggleChatbot);
    chatbotButton.addEventListener('touchstart', (e) => {
      e.preventDefault();
      toggleChatbot();
    }, { passive: false });
  }

  // Close chatbot window
  function closeChatbot() {
    if (chatbotWindow) {
      chatbotWindow.classList.remove('ai-chatbot-window-open');
      // Enable background scrolling when closing chatbot
      document.body.style.overflow = '';
      document.body.style.touchAction = '';
    }
  }

  if (chatbotClose) {
    chatbotClose.addEventListener('click', closeChatbot);
    chatbotClose.addEventListener('touchstart', (e) => {
      e.stopPropagation();
      closeChatbot();
    }, { passive: true });
  }

  // Close chatbot window when clicking outside
  window.addEventListener('click', (e) => {
    if (e.target === chatbotWindow) {
      chatbotWindow.classList.remove('ai-chatbot-window-open');
      // Enable background scrolling when closing chatbot
      document.body.style.overflow = '';
      document.body.style.touchAction = '';
    }
  });

  // Prevent scroll propagation from chatbot window to background
  if (chatbotWindow) {
    // Touch events for mobile
    chatbotWindow.addEventListener('touchstart', (e) => {
      e.stopPropagation();
    }, { passive: true });
    
    chatbotWindow.addEventListener('touchmove', (e) => {
      e.stopPropagation();
    }, { passive: true });
    
    chatbotWindow.addEventListener('touchend', (e) => {
      e.stopPropagation();
    }, { passive: true });
    
    // Mouse events for desktop
    chatbotWindow.addEventListener('wheel', (e) => {
      e.stopPropagation();
    }, { passive: true });
  }
</script>
